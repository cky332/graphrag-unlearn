services:
  graphrag-delete:
    build: .
    container_name: graphrag-delete
    env_file:
      - .env
    volumes:
      # 挂载缓存目录，持久化图数据
      - ./cache:/app/cache
      # 挂载数据目录，持久化任务数据库
      - ./data:/app/data
    environment:
      - GRAPHRAG_TASK_DB=/app/data/tasks.db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
